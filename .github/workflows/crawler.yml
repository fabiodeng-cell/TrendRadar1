name: Get Hot News

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || pip install requests beautifulsoup4 lxml pyyaml feedparser
    - name: Run crawler
      env:
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
      run: python main.py
